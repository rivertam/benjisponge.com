# Build with the same image used for Cloudflare Containers.
# Context stays the repo root (Dockerfile COPY paths assume that).
[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/Dockerfile"

[deploy]
# CMD is already in the Dockerfile; Railway injects PORT at runtime.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
