# Pre-commit keeps auto-fix + one clippy pass + the full test suite.
# CI still runs `just check` (fmt --check, clippy, test) — don't re-run that
# here or every commit pays for clippy twice.
pre-commit:
  parallel: false
  commands:
    clippy:
      glob: "*.rs"
      run: cargo clippy --fix --all-targets --allow-dirty --allow-staged -- -D warnings
      stage_fixed: true
    format:
      glob: "*.rs"
      run: cargo fmt
      stage_fixed: true
    test:
      run: cargo test
