[package]
name = "benjisponge"
version = "0.1.0"
edition = "2024"

[dependencies]
qrcode = { version = "0.14.1", default-features = false, features = ["svg"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
tokio = { version = "1.53.0", features = ["rt-multi-thread", "macros"] }
topcoat = { version = "0.1.3", features = ["tailwind", "font-fontsource"] }

[build-dependencies]
topcoat = { version = "0.1.3", default-features = false, features = ["tailwind"] }
