name: Deploy

on:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v2
      - run: just check

  deploy:
    needs: check
    runs-on: ubuntu-latest
    concurrency:
      group: deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Load into the local daemon so wrangler's own build is a cache hit,
      # and so we can extract the bundled assets from the image.
      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          tags: benjisponge-build:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract bundled assets for the static-asset layer
        run: |
          docker create --name extract benjisponge-build:latest
          mkdir -p deploy/assets/_topcoat
          docker cp extract:/app/assets deploy/assets/_topcoat/assets
          docker rm extract
          rm -f deploy/assets/_topcoat/assets/manifest.toml

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: deploy/package-lock.json

      - name: Deploy
        working-directory: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm ci
          npx wrangler deploy --var RELEASE_ID:${GITHUB_SHA::7}
